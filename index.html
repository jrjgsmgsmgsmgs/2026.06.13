<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>제주도 주요 지점 거리 지도 (Leaflet)</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    
    <style>
        /* 지도가 화면 전체에 꽉 차도록 설정 */
        body {
            margin: 0;
            padding: 0;
        }
        #map {
            width: 100vw;
            height: 100vh;
        }
        /* 거리 정보 팝업 스타일링 */
        .distance-label {
            background: white;
            border: 1px solid #666;
            border-radius: 4px;
            padding: 2px 5px;
            font-weight: bold;
            font-size: 12px;
            white-space: nowrap;
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    
    <script>
        // 1. 지도 초기화 (제주도 중심부 근처로 설정, 줌 레벨 12)
        const map = L.map('map').setView([33.485, 126.545], 12);

        // 2. 배경 지도 타일 추가 (OpenStreetMap)
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        // 3. 주요 지점 좌표 및 정보 정의
        const locations = {
            airport: { name: "제주국제공항", coords: [33.5104, 126.4914] },
            highschool: { name: "제주중앙여고", coords: [33.4898, 126.5391] },
            university: { name: "제주대학교", coords: [33.4560, 126.5621] }
        };

        // 4. 마커 생성 및 지도에 추가
        const markers = {};
        for (let key in locations) {
            const loc = locations[key];
            markers[key] = L.marker(loc.coords)
                .addTo(map)
                .bindPopup(`<b>${loc.name}</b>`)
                .openPopup(); // 처음 열릴 때 팝업 표시 (선택사항)
        }

        // 5. 지점 간 거리 계산 및 선(Polyline) 그리기 함수
        function drawDistanceLine(fromLoc, toLoc) {
            const fromLatLng = L.latLng(fromLoc.coords);
            const toLatLng = L.latLng(toLoc.coords);
            
            // 두 지점 간의 직선 거리 계산 (미터 단위 -> 킬로미터 단위 변환)
            const distance = (fromLatLng.distanceTo(toLatLng) / 1000).toFixed(2);

            // 선(Polyline) 그리기
            const polyline = L.polyline([fromLoc.coords, toLoc.coords], {
                color: '#3388ff',
                weight: 4,
                opacity: 0.6,
                dashArray: '5, 10' // 점선 효과
            }).addTo(map);

            // 선 중간 지점에 거리 표시 팝업 띄우기
            const midLatLng = [
                (fromLoc.coords[0] + toLoc.coords[0]) / 2,
                (fromLoc.coords[1] + toLoc.coords[1]) / 2
            ];

            // 마우스 커서를 올렸을 때 툴팁으로 거리 표시
            polyline.bindTooltip(`${fromLoc.name} ↔ ${toLoc.name}<br><b>직선 거리: ${distance} km</b>`, {
                sticky: true,
                direction: 'top'
            });
        }

        // 6. 각 구간 선 그리기 실행
        drawDistanceLine(locations.airport, locations.highschool); // 공항 ↔ 중앙여고
        drawDistanceLine(locations.highschool, locations.university); // 중앙여고 ↔ 제주대
        drawDistanceLine(locations.airport, locations.university); // 공항 ↔ 제주대 (필요 없으시면 이 줄을 지우세요!)

    </script>
</body>
</html>
